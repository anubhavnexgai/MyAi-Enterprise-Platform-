<div class="page-header">
  <div>
    <h1 class="page-title">Deep Research</h1>
    <div class="page-subtitle">Multi-step web research with an LLM-in-the-loop — produces a rich visual report</div>
  </div>
</div>

<div class="card card-pad" id="rsForm">
  <label class="ws-field">Research question
    <textarea id="rsQuery" rows="3" placeholder="e.g. The best open-source LLMs to run locally in 2026 and their tradeoffs"></textarea>
  </label>
  <div class="rs-chips" id="rsChips">
    <button class="rs-chip active" data-cat="auto">Auto</button>
    <button class="rs-chip" data-cat="product">Product</button>
    <button class="rs-chip" data-cat="compare">Compare</button>
    <button class="rs-chip" data-cat="howto">How-to</button>
    <button class="rs-chip" data-cat="factcheck">Fact-check</button>
  </div>
  <div class="ws-row" style="margin-top:8px;align-items:flex-end">
    <label class="ws-field" style="max-width:160px">Rounds
      <select class="ws-input" id="rsRounds"><option value="0">Auto</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="5">5</option></select>
    </label>
    <label class="ws-field ws-grow">Model
      <select class="ws-input" id="rsModel"></select>
    </label>
    <button class="btn btn-primary" id="rsStart" style="margin-bottom:10px"><span class="material-symbols-rounded">play_arrow</span> Start</button>
  </div>
</div>

<div id="rsProgress" class="card card-pad" style="display:none;margin-top:14px"></div>

<!-- Scheduled research watches (recurring auto-research) -->
<div class="card card-pad" id="rsWatchCard" style="margin-top:14px">
  <div class="ws-toolbar"><h3 style="margin:0" class="ws-grow"><span class="material-symbols-rounded" style="vertical-align:-5px;color:var(--accent)">schedule</span> Research watches</h3></div>
  <div class="card-sub" style="margin-bottom:10px">Recurring auto-research — MyAi re-runs the topic on a schedule and saves a fresh report to your library.</div>
  <div class="ws-row" style="align-items:flex-end;gap:10px;flex-wrap:wrap">
    <label class="ws-field ws-grow" style="min-width:200px">Topic to watch
      <input class="ws-input" id="rsWatchTopic" placeholder="e.g. New open-source LLM releases this week">
    </label>
    <label class="ws-field" style="max-width:160px">Every
      <select class="ws-input" id="rsWatchEvery"><option value="6">6 hours</option><option value="12">12 hours</option><option value="24" selected>Daily</option><option value="168">Weekly</option></select>
    </label>
    <button class="btn btn-primary" id="rsWatchAdd" style="margin-bottom:2px"><span class="material-symbols-rounded">add</span> Add watch</button>
  </div>
  <div id="rsWatchList" class="rs-watch-list" style="margin-top:12px"></div>
</div>

<div class="ws-toolbar" style="margin-top:18px"><h3 style="margin:0" class="ws-grow">Past research</h3></div>
<div id="rsLibrary" class="ws-grid"></div>

<style>
.rs-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.rs-chip{border:1px solid var(--border);background:var(--bg-elev);color:var(--text-muted);border-radius:var(--r-pill);padding:5px 14px;font-size:13px;font-weight:600;cursor:pointer}
.rs-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.rs-log{font-size:13px;color:var(--text);display:flex;flex-direction:column;gap:6px;max-height:280px;overflow:auto}
.rs-watch-list{display:flex;flex-direction:column;gap:8px}
.rs-watch{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg-elev)}
.rs-watch-main{flex:1;min-width:0}
.rs-watch-topic{font-weight:600;font-size:13px;color:var(--text-strong);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rs-watch-meta{font-size:11.5px;color:var(--text-muted);margin-top:2px}
.rs-log .rs-line{display:flex;gap:8px;align-items:flex-start}
.rs-log .material-symbols-rounded{font-size:16px;color:var(--accent)}
#rsLibrary{display:grid;grid-template-columns:repeat(auto-fill,minmax(264px,1fr));gap:14px}
.rs-card{display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s}
.rs-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.rs-card .rs-ic{width:36px;height:36px;border-radius:11px;background:var(--accent-softer);color:var(--accent);display:grid;place-items:center;margin-bottom:11px}
.rs-card .rs-ic .material-symbols-rounded{font-size:20px}
.rs-card .rs-title{font-weight:700;color:var(--text-strong);font-size:13.5px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rs-card .rs-meta{font-size:12px;color:var(--text-muted);margin-top:5px}
.rs-card .rs-acts{display:flex;gap:6px;margin-top:14px;align-items:center}
</style>

<script>
(function(){
  const form=document.getElementById('rsForm'); if(!form||form.dataset.bound==='1') return; form.dataset.bound='1';
  const OUI='/api/oui'; const esc=window.escapeHtml, toast=window.toast||console.log;
  let cat='auto', model=null, running=false;

  document.getElementById('rsChips').querySelectorAll('.rs-chip').forEach(c=>c.onclick=()=>{ document.getElementById('rsChips').querySelectorAll('.rs-chip').forEach(x=>x.classList.remove('active')); c.classList.add('active'); cat=c.dataset.cat; });

  async function loadModels(){
    const d=await window.oui.get('/models'); const items=(d&&d.items)||[]; const sel=document.getElementById('rsModel'); const seen=new Set(); const list=[];
    const ordered=[...items].sort((a,b)=>(/\/v1/.test(b.url||'')?1:0)-(/\/v1/.test(a.url||'')?1:0));
    // Exclude non-chat model families (embed/safety/moderation/tts/image/etc.) —
    // a content-safety or embedding model produces garbage research.
    const nonChat=/(?:^|[-_/:])(?:embed|embedding|rerank|reranker|safety|moderation|moderat|guard|shield|tts|stt|whisper|audio|speech|voice|image|img|ocr|dall-?e|flux|sdxl|stable-?diffusion|clip|colpali)/i;
    for(const ep of ordered){ for(const m of (ep.models||[])){ if(nonChat.test(m)||seen.has(m)) continue; seen.add(m); list.push({ep,m}); } }
    sel.innerHTML=list.map(x=>'<option value="'+esc((x.ep.endpoint_id||'')+'|||'+x.m)+'">'+esc(x.m)+'</option>').join('')||'<option value="">No models — add one in Chat</option>';
    // Default to a reliable OpenRouter NON-REASONING instruct model (reasoning
    // models leak thinking / can return empty during synthesis).
    const reasoning=/(kimi|deepseek-?r1|[-_/]r1[-_:.]|qwq|reasoning|thinking|magistral)/i;
    const preferred=/(gemma|qwen.*instruct|instruct|gpt-oss|mistral|llama)/i;
    const isOR=x=>/openrouter\.ai/i.test(x.ep.url||x.ep.endpoint_url||'');
    const ok=list.filter(x=>!reasoning.test(x.m)); const or=ok.filter(isOR);
    const pick = or.find(x=>preferred.test(x.m)) || or[0] || ok.find(x=>preferred.test(x.m)) || ok[0] || list[0];
    if(pick) sel.value=(pick.ep.endpoint_id||'')+'|||'+pick.m;
  }

  const setActive=(sid)=>{ try{ sid?localStorage.setItem('rs_active',sid):localStorage.removeItem('rs_active'); }catch(e){} };

  // Stream a research run's progress. Used by Start AND on page-load resume, so
  // an in-progress run keeps showing live even after a refresh or in a new tab.
  async function streamResearch(sid, resumed){
    if(!sid||running) return; running=true;
    let cancelled=false, finalStatus='', errMsg='';
    const prog=document.getElementById('rsProgress'); prog.style.display='';
    prog.innerHTML='<div class="ws-toolbar"><b class="ws-grow" id="rsHead">'+(resumed?'Resuming research…':'Researching… (this can take a few minutes on a local model)')+'</b><button class="btn btn-sm btn-danger" id="rsCancel">Cancel</button></div><div class="rs-log" id="rsLog"><div class="rs-line"><span class="material-symbols-rounded">bolt</span>'+(resumed?'Reconnecting to your running research…':'Starting…')+'</div></div>';
    document.getElementById('rsCancel').onclick=async()=>{ cancelled=true; document.getElementById('rsHead').textContent='Cancelling…'; await window.oui.postJson('/research/cancel/'+sid,{}); };
    const log=document.getElementById('rsLog'); let lastPhase='';
    function line(t){ const d=document.createElement('div'); d.className='rs-line'; d.innerHTML='<span class="material-symbols-rounded">arrow_right</span>'+esc(t); log.appendChild(d); log.scrollTop=log.scrollHeight; }
    try{
      const res=await fetch(OUI+'/research/stream/'+sid,{credentials:'include'}); const rd=res.body.getReader(); const dec=new TextDecoder(); let buf='';
      while(true){ const {done,value}=await rd.read(); if(done) break; buf+=dec.decode(value,{stream:true}); const lines=buf.split('\n'); buf=lines.pop()||'';
        for(const ln of lines){ if(!ln.startsWith('data:')) continue; const dd=ln.slice(5).trim(); try{ const j=JSON.parse(dd);
          const ph=j.phase; if(ph){ if(ph==='reading'&&j.title) line('Reading: '+j.title); else if(ph!==lastPhase||j.round){ line(ph.charAt(0).toUpperCase()+ph.slice(1)+(j.round?(' · round '+j.round):'')+(j.total_sources?(' · '+j.total_sources+' sources'):'')+(j.total_findings?(' · '+j.total_findings+' findings'):'')); } lastPhase=ph; }
          else if(j.message) line(j.message);
          if(j.final||['done','complete','finished','error','cancelled'].includes(j.status)){ finalStatus=j.status||finalStatus; if(j.error){ errMsg=j.error; line('Error: '+j.error); } }
        }catch(e){} }
      }
    }catch(e){ /* stream ended */ }
    running=false; setActive(null);
    if(cancelled||finalStatus==='cancelled'){ prog.innerHTML='<b>Research cancelled.</b>'; }
    else if(finalStatus==='error'){ prog.innerHTML='<b style="color:var(--red)">Research failed.</b> <span style="color:var(--text-muted)">'+esc(errMsg||'See logs.')+'</span>'; }
    else if(finalStatus){ prog.innerHTML='<div class="ws-toolbar"><b class="ws-grow">Research complete</b><a class="btn btn-sm btn-primary" target="_blank" href="'+OUI+'/research/report/'+sid+'"><span class="material-symbols-rounded">open_in_new</span>Visual Report</a></div>'; }
    else { prog.innerHTML='<b>Stopped.</b> <span style="color:var(--text-muted)">Check Past research below — the report appears there when finished.</span>'; }
    loadLibrary();
  }

  document.getElementById('rsStart').onclick=async()=>{
    if(running) return; const query=document.getElementById('rsQuery').value.trim(); if(!query){ toast('Enter a question','error'); return; }
    const [epid,m]=(document.getElementById('rsModel').value||'|||').split('|||');
    const body={query, max_rounds:parseInt(document.getElementById('rsRounds').value||'0'), max_time:600, extraction_concurrency:2};
    if(cat!=='auto') body.category=cat; if(epid) body.endpoint_id=epid; if(m) body.model=m;
    const r=await window.oui.postJson('/research/start', body);
    const sid=r.json&&(r.json.session_id||r.json.id);
    if(!r.ok||!sid){ toast('Could not start research'+(r.json&&r.json.detail?': '+r.json.detail:''),'error'); return; }
    document.getElementById('rsQuery').value=''; setActive(sid); streamResearch(sid, false);
  };

  async function loadLibrary(){
    const d=await window.oui.get('/research/library'); const arr=(d&&(d.items||d.research||d.results))||(Array.isArray(d)?d:[]);
    const el=document.getElementById('rsLibrary');
    if(!arr.length){ el.innerHTML='<div class="ws-empty">No past research yet.</div>'; return; }
    el.innerHTML='';
    for(const it of arr){
      const id=it.session_id||it.id; const title=it.query||it.title||'Research'; const meta=(it.category||'')+(it.sources?(' · '+it.sources+' sources'):'')+(it.created_at?(' · '+String(it.created_at).slice(0,10)):'');
      const c=document.createElement('div'); c.className='card card-pad rs-card';
      c.innerHTML='<div class="rs-ic"><span class="material-symbols-rounded">travel_explore</span></div>'+
        '<div class="rs-title">'+esc(title)+'</div><div class="rs-meta">'+esc(meta||'Research report')+'</div>'+
        '<div class="rs-acts"><a class="btn btn-sm btn-primary" target="_blank" href="'+OUI+'/research/report/'+id+'"><span class="material-symbols-rounded">description</span>Report</a>'+
        '<button class="btn btn-sm" data-a="discuss"><span class="material-symbols-rounded">chat</span>Discuss</button>'+
        '<button class="btn btn-sm" data-a="council" title="Start a Council project from this research"><span class="material-symbols-rounded">groups</span>Council</button>'+
        '<button class="btn btn-sm btn-ghost" data-a="del" title="Delete" style="margin-left:auto;color:var(--text-soft)"><span class="material-symbols-rounded">delete</span></button></div>';
      c.querySelector('[data-a="discuss"]').onclick=async()=>{ await window.oui.postJson('/research/spinoff/'+id,{}); location.hash='#/copilot'; };
      c.querySelector('[data-a="council"]').onclick=()=>{ try{ localStorage.setItem('council_prefill_goal', title); }catch(e){} toast('Sent to Council — review the goal and run','success'); location.hash='#/agents'; };
      c.querySelector('[data-a="del"]').onclick=async()=>{ await window.oui.del('/research/'+id); loadLibrary(); };
      el.appendChild(c);
    }
  }
  // ---- Scheduled research watches (native /api/copilot/research/schedule*) ----
  const SJ=window.safeFetchJson;
  async function loadWatches(){
    const d=await SJ('/api/copilot/research/schedules'); const arr=(d&&d.schedules)||[];
    const el=document.getElementById('rsWatchList');
    if(!arr.length){ el.innerHTML='<div class="ws-empty" style="padding:10px">No watches yet — add a topic above to auto-research it on a schedule.</div>'; return; }
    el.innerHTML=arr.map(w=>{
      const every=w.interval_hours>=168?'weekly':w.interval_hours>=24?'daily':('every '+w.interval_hours+'h');
      const next=w.next_run?(' · next '+String(w.next_run).slice(0,16).replace('T',' ')):'';
      return '<div class="rs-watch" data-id="'+w.id+'"><div class="rs-watch-main"><div class="rs-watch-topic">'+esc(w.topic||'')+'</div>'+
        '<div class="rs-watch-meta">'+esc(every)+esc(next)+'</div></div>'+
        '<button class="btn btn-sm" data-a="run" title="Run now"><span class="material-symbols-rounded">play_arrow</span></button>'+
        '<button class="btn btn-sm btn-ghost" data-a="del" title="Remove watch" style="color:var(--text-soft)"><span class="material-symbols-rounded">delete</span></button></div>';
    }).join('');
    el.querySelectorAll('.rs-watch').forEach(row=>{
      const id=row.dataset.id;
      row.querySelector('[data-a="run"]').onclick=async()=>{ await SJ('/api/copilot/research/schedule/'+id+'/run',{method:'POST'}); toast('Running now — report will appear in your library','info'); };
      row.querySelector('[data-a="del"]').onclick=async()=>{ await SJ('/api/copilot/research/schedule/'+id,{method:'DELETE'}); toast('Watch removed','info'); loadWatches(); };
    });
  }
  document.getElementById('rsWatchAdd').onclick=async()=>{
    const topic=document.getElementById('rsWatchTopic').value.trim();
    if(!topic){ toast('Enter a topic to watch','error'); return; }
    const hrs=document.getElementById('rsWatchEvery').value;
    const d=await SJ('/api/copilot/research/schedule?interval_hours='+hrs,{method:'POST',body:{message:topic}});
    if(d&&d.id){ toast('Watch added','success'); document.getElementById('rsWatchTopic').value=''; loadWatches(); }
    else toast('Could not add watch','error');
  };

  loadModels(); loadLibrary(); loadWatches();
  // Resume an in-progress research run after a refresh / in another tab.
  try{ const active=localStorage.getItem('rs_active'); if(active) streamResearch(active, true); }catch(e){}
})();
</script>
