<div class="page-header">
  <div>
    <h1 class="page-title">Admin Console</h1>
    <div class="page-subtitle">How NexgAI is using MyAi — per-employee usage at a glance</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="pill pill-purple"><span class="material-symbols-rounded" style="font-size:15px;vertical-align:-3px">shield_person</span> Super Admin</span>
    <button class="btn btn-primary" id="adminRefreshBtn">
      <span class="material-symbols-rounded">refresh</span> Refresh
    </button>
  </div>
</div>

<div style="margin:6px 0 14px;color:var(--text-muted);font-size:13px">
  <span class="live-dot" style="width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;vertical-align:1px"></span>
  Tenant <b id="adminTenant">—</b> · <span id="adminGenerated">loading…</span>
</div>

<div class="kpi-row" id="adminKpis" style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:14px"></div>

<div class="card" style="padding:14px 16px;margin-bottom:18px">
  <div style="font-weight:700;color:var(--text-strong);font-size:13px;margin-bottom:10px">Activity — last 7 days</div>
  <div id="adminTrend" style="display:flex;align-items:flex-end;gap:8px;height:112px"></div>
</div>

<div class="card" style="padding:0;overflow:hidden">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)">
    <div style="font-weight:700;color:var(--text-strong)">Employees</div>
    <input id="adminEmpSearch" placeholder="Filter by name or email" style="border:1px solid var(--border);border-radius:8px;padding:7px 11px;font-size:13px;width:240px" />
  </div>
  <div class="admin-emp-head" style="display:grid;grid-template-columns:1.6fr 1fr 80px 80px 96px 1.1fr 140px;gap:12px;padding:10px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);border-bottom:1px solid var(--border)">
    <div>Employee</div><div>Roles</div><div style="text-align:right">Chats</div><div style="text-align:right">Actions</div><div style="text-align:right">Tokens</div><div>Top activity</div><div>Last active</div>
  </div>
  <div id="adminEmpRows"></div>
</div>

<div style="text-align:center;margin-top:20px">
  <a href="#/dashboard" style="font-size:13px">
    <span class="material-symbols-rounded" style="vertical-align:-5px;font-size:18px">arrow_back</span>
    Back to Dashboard
  </a>
</div>
