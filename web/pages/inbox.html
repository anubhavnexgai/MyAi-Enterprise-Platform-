<div class="page-header">
  <div>
    <h1 class="page-title">Inbox</h1>
    <div class="page-subtitle">Your emails, meetings and tasks — ranked by what needs your attention</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <div id="accountSwitcher" style="display:flex;gap:4px;background:var(--bg-soft);padding:4px;border-radius:8px;border:1px solid var(--border-dim)"></div>
    <button class="btn" id="composeBtn" title="Ask MyAi to draft a new email">
      <span class="material-symbols-rounded">edit_note</span>
      Compose with MyAi
    </button>
    <button class="btn btn-primary" id="refreshInbox">
      <span class="material-symbols-rounded">refresh</span>
      Refresh
    </button>
  </div>
</div>

<!-- AI Autonomy — compact: slider + current level; details are collapsible -->
<div class="card autonomy-card" style="padding:14px 16px">
  <div class="autonomy-head" style="margin-bottom:6px">
    <div style="display:flex;align-items:center;gap:10px">
      <h3 class="card-title" style="margin:0">AI Autonomy</h3>
      <span class="pill pill-red" id="levelBadge">L1 — Observe</span>
    </div>
    <button class="btn btn-sm" id="autonomyToggle" style="font-size:12px">
      <span class="material-symbols-rounded" style="font-size:16px">tune</span> Levels
    </button>
  </div>
  <div class="autonomy-slider" id="autonomySlider"></div>
  <div class="card-sub" id="autonomyOneLine" style="margin-top:8px;font-size:12.5px"></div>
  <div class="autonomy-levels" id="autonomyLevels" style="display:none;margin-top:10px"></div>
</div>

<!-- Filter Row — priority only (inbox is email-only) -->
<div class="filter-row">
  <button class="pill-filter active" data-prio="All">All</button>
  <button class="pill-filter" data-prio="Critical">Critical</button>
  <button class="pill-filter" data-prio="High">High</button>
  <button class="pill-filter" data-prio="Medium">Medium</button>
  <button class="pill-filter" data-prio="Low">Low</button>
  <div style="margin-left:auto;font-size:13px;color:var(--text-muted)" id="taskCount">Showing 0 of 0</div>
</div>

<!-- Split -->
<div class="split">
  <div>
    <div id="taskList"></div>
  </div>
  <div class="card" id="taskDetail">
    <div class="empty-pane">
      <div>
        <span class="material-symbols-rounded">inbox</span>
        <h3 style="margin:8px 0 4px;color:var(--text-strong)">Pick something to act on</h3>
        <div>Select an email, meeting or task to see details and one-click AI actions.</div>
      </div>
    </div>
  </div>
</div>
