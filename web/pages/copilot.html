<!--
  Copilot — Odysseus-grade chat, MyAi-skinned.
  Streaming animation, rich markdown (marked + highlight.js), per-message actions
  + token/time metrics, agent tool-steps, full input bar. Backend via the
  per-tenant Odysseus engine through the bridge proxy (/api/oui/*).
  Self-initializing; legacy initCopilot() bails when #ody-chat-root exists.
-->
<div id="ody-chat-root" class="oc-root">
  <!-- ===== SESSIONS SIDEBAR (collapsible) ===== -->
  <aside class="oc-sidebar" id="ocSidebar">
    <div class="oc-side-top">
      <button class="oc-newchat" id="ocNewChat"><span class="material-symbols-rounded">add</span> New chat</button>
    </div>
    <div class="oc-side-search"><span class="material-symbols-rounded">search</span><input id="ocSearch" placeholder="Search chats" /></div>
    <div class="oc-side-label">Chats</div>
    <div class="oc-session-list" id="ocSessions"><div class="oc-empty-note">No chats yet</div></div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="oc-main">
    <div class="oc-top">
      <button class="oc-icon-btn" id="ocToggleSide" title="Toggle sidebar"><span class="material-symbols-rounded">dock_to_right</span></button>
      <div class="oc-top-title" id="ocTopTitle">New chat</div>
      <span class="oc-mode-pill" id="ocModePill">Agent</span>
    </div>

    <div class="oc-history" id="ocHistory"></div>

    <!-- ===== INPUT BAR ===== -->
    <div class="oc-inputwrap">
      <div class="oc-inputbar">
        <div class="oc-input-top">
          <textarea id="ocInput" rows="1" placeholder="Message MyAi…"></textarea>
          <button class="oc-model-pick" id="ocModelPick" title="Model"><span id="ocModelPickLabel">Model</span><span class="material-symbols-rounded">expand_less</span></button>
        </div>
        <div class="oc-input-bottom">
          <div class="oc-input-left">
            <button class="oc-tool" id="ocOverflow" title="More"><span class="material-symbols-rounded">add</span></button>
            <button class="oc-tool" id="ocWeb" title="Web search"><span class="material-symbols-rounded">language</span></button>
            <button class="oc-tool" id="ocBash" title="Shell access (Agent)"><span class="material-symbols-rounded">terminal</span></button>
            <button class="oc-tool" id="ocMic" title="Voice input"><span class="material-symbols-rounded">mic</span></button>
          </div>
          <div class="oc-input-right">
            <div class="oc-modeswitch"><button id="ocModeAgent" class="active">Agent</button><button id="ocModeChat">Chat</button></div>
            <button class="oc-send" id="ocSend" title="Send"><span class="material-symbols-rounded">arrow_upward</span></button>
          </div>
        </div>
      </div>
      <div class="oc-overflow-menu" id="ocOverflowMenu" hidden>
        <button data-of="attach"><span class="material-symbols-rounded">attach_file</span> Attach file</button>
        <button data-of="documents"><span class="material-symbols-rounded">description</span> Documents</button>
        <button data-of="notes"><span class="material-symbols-rounded">sticky_note_2</span> Notes</button>
        <button data-of="research"><span class="material-symbols-rounded">travel_explore</span> Deep Research</button>
      </div>
    </div>
  </main>
</div>

<style>
.oc-root{position:fixed;inset:0 0 0 var(--sidebar-w,240px);display:grid;grid-template-columns:264px 1fr;background:var(--bg);color:var(--text);overflow:hidden;transition:grid-template-columns .2s ease}
.oc-root.side-collapsed{grid-template-columns:0 1fr}
.oc-root.side-collapsed .oc-sidebar{opacity:0;pointer-events:none}
@media(max-width:900px){.oc-root{left:0;grid-template-columns:0 1fr}.oc-sidebar{display:none}}
/* sidebar */
.oc-sidebar{display:flex;flex-direction:column;background:var(--bg-sidebar);border-right:1px solid var(--border);min-height:0;padding:12px 10px;gap:10px;overflow:hidden;transition:opacity .15s}
.oc-newchat{width:100%;display:flex;align-items:center;gap:8px;justify-content:center;border:1px solid var(--border);background:var(--bg-elev);color:var(--text-strong);border-radius:var(--r);padding:9px;font-weight:600;cursor:pointer}
.oc-newchat:hover{border-color:var(--accent);color:var(--accent)}
.oc-side-search{display:flex;align-items:center;gap:6px;background:var(--bg-subtle);border-radius:var(--r);padding:6px 10px;color:var(--text-muted)}
.oc-side-search input{flex:1;border:0;background:transparent;outline:none;color:var(--text)}
.oc-side-label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-soft);margin:2px}
.oc-session-list{overflow:auto;display:flex;flex-direction:column;gap:2px;flex:1}
.oc-session-item{display:flex;flex-direction:row;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;border:1px solid transparent}
.oc-session-item:hover{background:var(--bg-hover)}
.oc-session-item.active{background:var(--accent-soft);border-color:var(--accent)}
.oc-session-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.oc-session-name{font-size:13px;color:var(--text-strong);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.oc-session-time{font-size:11px;color:var(--text-soft)}
.oc-session-del{opacity:0;flex:0 0 auto;border:none;background:none;color:var(--text-soft);cursor:pointer;padding:4px;border-radius:6px;display:flex;transition:opacity .12s,background .12s,color .12s}
.oc-session-item:hover .oc-session-del{opacity:1}
.oc-session-del:hover{background:var(--red-soft);color:var(--red)}
.oc-session-del .material-symbols-rounded{font-size:17px}
.oc-empty-note{color:var(--text-soft);font-size:12px;padding:8px 4px}
/* main */
.oc-main{display:flex;flex-direction:column;min-width:0;min-height:0}
.oc-top{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg-elev)}
.oc-icon-btn{border:0;background:transparent;color:var(--text-muted);cursor:pointer;border-radius:var(--r);padding:5px;display:flex}
.oc-icon-btn:hover{background:var(--bg-subtle);color:var(--accent)}
.oc-top-title{font-weight:700;color:var(--text-strong);flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.oc-mode-pill{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:3px 10px;border-radius:var(--r-pill)}
.oc-history{flex:1;overflow:auto;padding:24px 18px;display:flex;flex-direction:column;gap:18px}
/* welcome */
.oc-welcome{margin:auto;text-align:center;color:var(--text-muted);max-width:680px;width:100%}
.oc-welcome-logo{font-size:46px;color:var(--accent)}
.oc-welcome-hi{font-size:24px;font-weight:800;color:var(--text-strong);margin-top:6px}
.oc-welcome-sub{margin-top:6px}
.oc-suggest{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px;text-align:left}
@media(max-width:680px){.oc-suggest{grid-template-columns:1fr}}
.oc-suggest-card{display:flex;align-items:center;gap:10px;border:1px solid var(--border);background:var(--bg-elev);border-radius:var(--r-md);padding:12px;cursor:pointer;min-width:0;overflow:hidden}
.oc-suggest-card:hover{border-color:var(--accent);box-shadow:var(--shadow-sm)}
.oc-suggest-card .material-symbols-rounded{color:var(--accent)}
.oc-sc-text{display:flex;flex-direction:column;min-width:0}
.oc-sc-text b{color:var(--text-strong);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.oc-sc-text span{color:var(--text-muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* messages */
.oc-msg{display:flex;flex-direction:column;gap:4px;max-width:820px;width:100%;align-self:center;animation:ui-fadein .2s ease both}
.oc-msg.user{align-items:flex-end}
.oc-msg-head{display:flex;align-items:center;gap:8px;font-size:12px}
.oc-who{font-weight:700}
.oc-msg.user .oc-who{color:var(--text-soft)}
.oc-msg.ai .oc-who{color:var(--green)}
.oc-time{color:var(--text-soft)}
.oc-body{border-radius:var(--r-md);padding:12px 14px;line-height:1.6;word-wrap:break-word;overflow-wrap:anywhere}
.oc-msg.user .oc-body{background:var(--accent);color:#fff;max-width:75%}
.oc-msg.ai .oc-body{background:var(--bg-elev);border:1px solid var(--border);color:var(--text);width:100%}
.oc-body p{margin:0 0 10px}.oc-body p:last-child{margin-bottom:0}
.oc-body pre{background:var(--bg-subtle);border:1px solid var(--border);border-radius:var(--r);padding:12px;overflow:auto;font-size:12.5px;margin:8px 0}
.oc-body code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px}
.oc-body :not(pre)>code{background:var(--bg-subtle);padding:1px 5px;border-radius:4px}
.oc-body ul,.oc-body ol{margin:6px 0 10px;padding-left:22px}
.oc-body table{border-collapse:collapse;margin:8px 0}.oc-body th,.oc-body td{border:1px solid var(--border);padding:5px 9px}
.oc-body a{color:var(--accent)}
.oc-cursor{display:inline-block;width:7px;height:15px;background:var(--accent);vertical-align:-2px;margin-left:2px;animation:ocblink 1s steps(2) infinite;border-radius:1px}
@keyframes ocblink{0%,100%{opacity:1}50%{opacity:0}}
.oc-foot{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--text-soft);opacity:0;transition:opacity .15s}
.oc-msg:hover .oc-foot{opacity:1}
.oc-foot .oc-metrics{margin-right:auto}
.oc-foot button{border:0;background:transparent;color:var(--text-soft);cursor:pointer;display:flex;padding:2px;border-radius:4px}
.oc-foot button:hover{color:var(--accent);background:var(--bg-subtle)}
.oc-foot .material-symbols-rounded{font-size:15px}
/* agent steps */
.oc-step{font-size:12px;color:var(--text-muted);background:var(--bg-subtle);border:1px solid var(--border);border-radius:var(--r);padding:6px 10px;margin:6px 0;display:flex;gap:6px;align-items:flex-start}
.oc-step .material-symbols-rounded{font-size:15px;color:var(--accent)}
.oc-step pre{margin:4px 0 0;max-height:160px}
/* input */
.oc-inputwrap{position:relative;padding:0 18px 18px}
.oc-inputbar{max-width:820px;margin:0 auto;border:1px solid var(--border);border-radius:18px;background:var(--bg-elev);box-shadow:var(--shadow-sm);padding:10px 12px}
.oc-inputbar:focus-within{border-color:var(--accent)}
.oc-input-top{display:flex;align-items:flex-start;gap:8px}
.oc-inputbar textarea{flex:1;border:0;outline:none;resize:none;background:transparent;color:var(--text);font:inherit;max-height:200px;padding-top:4px}
.oc-model-pick{display:flex;align-items:center;gap:3px;border:0;background:transparent;color:var(--text-muted);font-size:12px;cursor:pointer;white-space:nowrap;padding:4px 6px;border-radius:var(--r)}
.oc-model-pick:hover{background:var(--bg-subtle);color:var(--accent)}
.oc-model-pick .material-symbols-rounded{font-size:16px}
.oc-input-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px}
.oc-input-left,.oc-input-right{display:flex;align-items:center;gap:4px}
.oc-tool{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1px solid transparent;background:transparent;color:var(--text-muted);border-radius:50%;cursor:pointer}
.oc-tool:hover{background:var(--bg-subtle);color:var(--accent)}
.oc-tool.on{background:var(--accent-soft);color:var(--accent)}
.oc-tool .material-symbols-rounded{font-size:18px}
.oc-modeswitch{display:flex;border:1px solid var(--border);border-radius:var(--r-pill);overflow:hidden}
.oc-modeswitch button{border:0;background:transparent;color:var(--text-muted);padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer}
.oc-modeswitch button.active{background:var(--accent);color:#fff}
.oc-send{width:36px;height:36px;border:0;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
.oc-send:hover{background:var(--accent-hover)}.oc-send:disabled{opacity:.5;cursor:not-allowed}
.oc-overflow-menu{position:absolute;bottom:74px;left:32px;background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-lg);padding:6px;z-index:30;min-width:200px}
.oc-overflow-menu button{display:flex;align-items:center;gap:8px;width:100%;border:0;background:transparent;color:var(--text);padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;font-size:13px}
.oc-overflow-menu button:hover{background:var(--bg-hover)}
.oc-overflow-menu .material-symbols-rounded{font-size:18px;color:var(--text-muted)}
.oc-model-menu{position:fixed;z-index:60;background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-lg);width:340px;max-height:380px;overflow:auto;padding:6px}
.oc-model-menu .mm-row{padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;color:var(--text)}
.oc-model-menu .mm-row:hover{background:var(--bg-hover)}
.oc-model-menu .mm-ep{font-size:11px;color:var(--text-soft);padding:8px 10px 2px;text-transform:uppercase}
.oc-model-menu .mm-add{margin-top:6px;border-top:1px solid var(--border);color:var(--accent);font-weight:600}
.oc-fld{display:flex;flex-direction:column;gap:4px;font-size:13px;color:var(--text-muted);margin-bottom:12px}
.oc-fld input{border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;font:inherit;color:var(--text)}
</style>

<script>
(function(){
  const root=document.getElementById('ody-chat-root'); if(!root || root.dataset.bound==='1') return; root.dataset.bound='1';
  const OUI='/api/oui'; const $=s=>root.querySelector(s);
  const hist=$('#ocHistory'), input=$('#ocInput');
  const state={sid:null, model:null, mode:'agent', web:false, bash:false, models:[], streaming:false, lastUser:'', msgCount:0};
  const esc=s=>(window.escapeHtml?window.escapeHtml(s):String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])));
  const notify=(m,t)=>(window.toast?window.toast(m,t||'info'):console.log(m));
  const now=()=>new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

  // ---------- markdown libs (marked + dompurify + highlight.js) ----------
  function ensureLibs(){
    if(!document.getElementById('oc-hljs-css')){ const l=document.createElement('link'); l.id='oc-hljs-css'; l.rel='stylesheet'; l.href='https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css'; document.head.appendChild(l); }
    const need=[];
    if(!window.marked) need.push('https://cdn.jsdelivr.net/npm/marked/marked.min.js');
    if(!window.DOMPurify) need.push('https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js');
    if(!window.hljs) need.push('https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js');
    return Promise.all(need.map(src=>new Promise(res=>{ const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=res; document.head.appendChild(s); })));
  }
  function renderMD(text){
    if(window.marked && window.DOMPurify){
      try{ return window.DOMPurify.sanitize(window.marked.parse(text||'', {breaks:true, gfm:true})); }catch(e){}
    }
    return (window.renderMarkdownSafe?window.renderMarkdownSafe(text):esc(text).replace(/\n/g,'<br>'));
  }
  function highlightIn(el){ if(window.hljs) el.querySelectorAll('pre code').forEach(b=>{ try{window.hljs.highlightElement(b);}catch(e){} }); }
  function shortModel(s){ s=String(s); return s.length>18?s.slice(0,17)+'…':s; }

  // ---------- models ----------
  function isChatModel(m){ return !/embed/i.test(String(m)); }
  async function loadModels(){
    const d=await jget('/models'); const items=(d&&(d.items||d.models))||[]; state.models=items;
    // Reasoning models (kimi / deepseek-r1 / qwq …) leak their chain-of-thought
    // into answers, so we never DEFAULT to them (the user can still pick one).
    const reasoning=/(kimi|deepseek-?r1|[-_/]r1[-_:.]|qwq|reasoning|thinking|magistral)/i;
    const def=await jget('/default-chat');
    if(def&&def.endpoint_url&&def.model&&!reasoning.test(def.model)) state.model={endpoint_url:def.endpoint_url,model:def.model,endpoint_id:def.endpoint_id||''};
    else {
      // Build all (endpoint, model) pairs from /v1 endpoints, then pick a
      // reliable NON-REASONING instruct model (prefer instruct, then fast).
      const preferred=/(gemma|qwen.*instruct|instruct|gpt-oss|mistral|llama)/i;
      const fast=/(:|[-_ ])(0\.5b|1\.5b|1b|2b|3b|mini|small|phi)/i;
      const pairs=[];
      for(const ep of items){ if(!/\/v1/.test(ep.url||ep.endpoint_url||'')) continue; for(const m of (ep.models||[]).filter(isChatModel)) pairs.push({endpoint_url:ep.endpoint_url||ep.url,model:m,endpoint_id:ep.endpoint_id||''}); }
      if(!pairs.length){ for(const ep of items){ const m=(ep.models||[]).filter(isChatModel)[0]; if(m){ pairs.push({endpoint_url:ep.endpoint_url||ep.url,model:m,endpoint_id:ep.endpoint_id||''}); break; } } }
      const usable=pairs.filter(p=>!reasoning.test(p.model));
      const isOR=p=>/openrouter\.ai/i.test(p.endpoint_url||'');
      const or=usable.filter(isOR);
      // Prefer an OpenRouter instruct model; fall back through OR-any → instruct → fast → any.
      state.model = or.find(p=>preferred.test(p.model)) || or[0]
        || usable.find(p=>preferred.test(p.model)) || usable.find(p=>fast.test(p.model)) || usable[0] || pairs[0] || null;
    }
    paintModel();
  }
  function paintModel(){ $('#ocModelPickLabel').textContent=state.model?shortModel(state.model.model):'Model'; }
  function openModelMenu(anchor){
    closeModelMenu(); const menu=document.createElement('div'); menu.className='oc-model-menu'; menu.id='ocModelMenu'; let html=''; const seen=new Set();
    // /v1 (OpenAI-compatible) endpoints first so each model maps to a working URL.
    const eps=[...state.models].sort((a,b)=>(/\/v1/.test(b.url||b.endpoint_url||'')?1:0)-(/\/v1/.test(a.url||a.endpoint_url||'')?1:0));
    for(const ep of eps){ const name=ep.endpoint_name||ep.name||ep.url||'endpoint'; const ms=(ep.models||(ep.model?[ep.model]:[])).filter(isChatModel).filter(m=>{if(seen.has(m))return false;seen.add(m);return true;}); if(!ms.length) continue; html+='<div class="mm-ep">'+esc(name)+'</div>'; for(const m of ms) html+='<div class="mm-row" data-url="'+esc(ep.endpoint_url||ep.url||'')+'" data-id="'+esc(ep.endpoint_id||'')+'" data-model="'+esc(m)+'">'+esc(m)+'</div>'; }
    if(!seen.size) html+='<div class="mm-ep">No models yet</div>';
    html+='<div class="mm-row mm-add"><span class="material-symbols-rounded" style="font-size:16px;vertical-align:-3px">add</span> Add a model / provider…</div>';
    menu.innerHTML=html; document.body.appendChild(menu);
    const r=anchor.getBoundingClientRect(); menu.style.left=Math.max(8,Math.min(r.left,window.innerWidth-360))+'px'; menu.style.bottom=(window.innerHeight-r.top+8)+'px';
    menu.querySelectorAll('.mm-row').forEach(row=>row.addEventListener('click',()=>{ if(row.classList.contains('mm-add')){ closeModelMenu(); addModelModal(); return; } state.model={endpoint_url:row.dataset.url,model:row.dataset.model,endpoint_id:row.dataset.id}; paintModel(); closeModelMenu(); }));
    setTimeout(()=>document.addEventListener('mousedown',outside),0);
  }
  function outside(e){ const m=document.getElementById('ocModelMenu'); if(m&&!m.contains(e.target)) closeModelMenu(); }
  function closeModelMenu(){ const m=document.getElementById('ocModelMenu'); if(m) m.remove(); document.removeEventListener('mousedown',outside); }
  function addModelModal(){
    window.openModal('<div class="modal-head"><h3>Add a model / provider</h3><button class="icon-btn" data-close><span class="material-symbols-rounded">close</span></button></div>'+
      '<div class="modal-body"><p style="color:var(--text-muted);font-size:13px;margin-top:0">Any OpenAI-compatible or Ollama endpoint (vLLM, llama.cpp, Ollama, OpenRouter, OpenAI…). For local Ollama use <code>http://localhost:11434/v1</code>.</p>'+
      '<label class="oc-fld">Name<input id="amName" placeholder="My Ollama"></label><label class="oc-fld">Base URL<input id="amUrl" placeholder="http://localhost:11434/v1"></label><label class="oc-fld">API key (optional)<input id="amKey" type="password"></label></div>'+
      '<div class="modal-foot"><button class="btn" data-close>Cancel</button><button class="btn btn-primary" id="amSave">Add</button></div>');
    document.getElementById('amSave').onclick=async()=>{ const base=document.getElementById('amUrl').value.trim(); if(!base){notify('Base URL required','error');return;} const body=fd({name:document.getElementById('amName').value.trim(),base_url:base,api_key:document.getElementById('amKey').value.trim(),skip_probe:'false',shared:'false'}); const r=await fetch(OUI+'/model-endpoints',{method:'POST',credentials:'include',body}); if(r.ok){ window.closeModal(); notify('Model added','success'); loadModels(); } else notify('Add failed: '+r.status,'error'); };
  }

  // ---------- helpers ----------
  async function jget(p){ try{ const r=await fetch(OUI+p,{credentials:'include'}); if(!r.ok) return null; return await r.json(); }catch(e){ return null; } }
  function fd(o){ const f=new FormData(); for(const k in o){ if(o[k]!=null) f.append(k,o[k]); } return f; }

  // ---------- sessions ----------
  async function loadSessions(){
    const list=await jget('/sessions'); const el=$('#ocSessions'); const arr=Array.isArray(list)?list:(list&&list.sessions)||[];
    if(!arr.length){ el.innerHTML='<div class="oc-empty-note">No chats yet</div>'; return; }
    el.innerHTML='';
    for(const s of arr){
      const it=document.createElement('div'); it.className='oc-session-item'+(s.id===state.sid?' active':'');
      const nm=s.name||s.title||'Chat';
      it.innerHTML='<div class="oc-session-main"><div class="oc-session-name">'+esc(nm)+'</div><div class="oc-session-time">'+esc(fmt(s.updated_at||s.created_at||''))+'</div></div>'+
        '<button class="oc-session-del" title="Delete chat"><span class="material-symbols-rounded">delete</span></button>';
      it.querySelector('.oc-session-main').onclick=()=>selectSession(s.id);
      it.querySelector('.oc-session-del').onclick=(e)=>{ e.stopPropagation(); delChat(s.id, nm); };
      el.appendChild(it);
    }
  }
  async function delChat(id, name){
    if(!confirm('Delete chat "'+name+'"? This cannot be undone.')) return;
    try{ await fetch(OUI+'/session/'+id,{method:'DELETE',credentials:'include'}); }catch(e){}
    if(state.sid===id){ newChat(); } else { loadSessions(); }
    notify('Chat deleted','success');
  }
  function fmt(t){ if(!t) return ''; try{ const d=new Date(t); if(isNaN(d)) return ''; return d.toLocaleDateString()+' '+d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }catch(e){return '';} }
  async function selectSession(id){
    state.sid=id; const data=await jget('/session/'+id+'/messages'); const msgs=(data&&(data.messages||data))||[];
    hist.innerHTML=''; state.msgCount=0;
    for(const m of msgs){ addMsg(m.role==='user'?'user':'ai', m.content||m.text||'', {model:m.model}); }
    $('#ocTopTitle').textContent=(msgs.length?('Chat · '+msgs.length+' msgs'):'Chat'); loadSessions();
  }
  function newChat(){ state.sid=null; $('#ocTopTitle').textContent='New chat'; showWelcome(); loadSessions(); }

  // ---------- welcome + suggestions ----------
  function showWelcome(){
    hist.innerHTML='<div class="oc-welcome"><div class="oc-welcome-logo material-symbols-rounded">smart_toy</div><div class="oc-welcome-hi">How can I help?</div><div class="oc-welcome-sub">Pick a model, then chat. Switch to <b>Agent</b> to let it use tools.</div><div class="oc-suggest" id="ocSuggest"></div></div>';
    loadSuggestions();
  }
  async function loadSuggestions(){
    let data=null; try{ const r=await fetch('/api/copilot/suggestions',{credentials:'include'}); if(r.ok) data=await r.json(); }catch(e){}
    const sg=(data&&data.suggestions)||[]; const box=$('#ocSuggest'); if(!box) return; if(!sg.length){ box.innerHTML=''; return; }
    box.innerHTML=sg.slice(0,6).map((s,i)=>'<button class="oc-suggest-card" data-i="'+i+'"><span class="material-symbols-rounded">'+(s.icon||'bolt')+'</span><span class="oc-sc-text"><b>'+esc(s.title||'')+'</b><span>'+esc(s.sub||'')+'</span></span></button>').join('');
    box.querySelectorAll('.oc-suggest-card').forEach(b=>b.addEventListener('click',()=>{ const s=sg[+b.dataset.i]; const p=s.prompt||s.title||''; input.value=p; autosize(); input.focus(); if(!/\s$/.test(p)&&p.trim().length>14) send(); }));
  }

  // ---------- messages ----------
  function clearWelcome(){ const w=hist.querySelector('.oc-welcome'); if(w) w.remove(); }
  function addMsg(role, text, opts){
    opts=opts||{}; clearWelcome();
    const wrap=document.createElement('div'); wrap.className='oc-msg '+role;
    const who=role==='user'?'You':(opts.model||(state.model&&state.model.model)||'MyAi');
    const head=document.createElement('div'); head.className='oc-msg-head'; head.innerHTML='<span class="oc-who">'+esc(who)+'</span><span class="oc-time">'+now()+'</span>';
    const body=document.createElement('div'); body.className='oc-body'+(role==='ai'?' markdown':'');
    if(role==='user') body.textContent=text; else { body.innerHTML=renderMD(text); highlightIn(body); }
    const foot=document.createElement('div'); foot.className='oc-foot';
    wrap.appendChild(head); wrap.appendChild(body); wrap.appendChild(foot);
    if(text){ buildFoot(foot, role, body, text); }
    hist.appendChild(wrap); hist.scrollTop=hist.scrollHeight; state.msgCount++;
    return {wrap, body, foot};
  }
  function buildFoot(foot, role, body, getText, metrics){
    const txt=typeof getText==='function'?getText():getText;
    let h='';
    if(role==='ai' && metrics) h+='<span class="oc-metrics">'+metrics+'</span>'; else if(role==='ai') h+='<span class="oc-metrics"></span>';
    h+='<button data-a="copy" title="Copy"><span class="material-symbols-rounded">content_copy</span></button>';
    if(role==='ai') h+='<button data-a="regen" title="Regenerate"><span class="material-symbols-rounded">refresh</span></button>';
    if(role==='user') h+='<button data-a="edit" title="Edit"><span class="material-symbols-rounded">edit</span></button>';
    h+='<button data-a="del" title="Delete"><span class="material-symbols-rounded">close</span></button>';
    foot.innerHTML=h;
    const t=()=>typeof getText==='function'?getText():getText;
    const cp=foot.querySelector('[data-a="copy"]'); if(cp) cp.onclick=()=>{ navigator.clipboard.writeText(t()); notify('Copied','success'); };
    const rg=foot.querySelector('[data-a="regen"]'); if(rg) rg.onclick=()=>{ if(state.lastUser){ input.value=state.lastUser; send(); } };
    const ed=foot.querySelector('[data-a="edit"]'); if(ed) ed.onclick=()=>{ input.value=t(); autosize(); input.focus(); };
    const dl=foot.querySelector('[data-a="del"]'); if(dl) dl.onclick=()=>{ foot.closest('.oc-msg').remove(); };
  }

  async function send(){
    const text=input.value.trim(); if(!text||state.streaming) return;
    if(!state.model){ notify('Pick a model first','error'); openModelMenu($('#ocModelPick')); return; }
    state.lastUser=text; input.value=''; autosize();
    addMsg('user', text);
    if(!state.sid){ const body=fd({name:text.slice(0,40),endpoint_url:state.model.endpoint_url,model:state.model.model,endpoint_id:state.model.endpoint_id||''}); try{ const r=await fetch(OUI+'/session',{method:'POST',credentials:'include',body}); if(r.ok){ const j=await r.json(); state.sid=j.id||j.session_id||j.session; } }catch(e){} if(!state.sid){ notify('Could not start a chat session','error'); return; } }
    state.streaming=true; $('#ocSend').disabled=true;
    const ai=addMsg('ai',''); ai.body.innerHTML='<span class="oc-cursor"></span>';
    const payload={message:text, session:state.sid, mode:state.mode};
    if(state.web) payload[state.mode==='agent'?'allow_web_search':'use_web']='true';
    if(state.bash && state.mode==='agent') payload['allow_bash']='true';
    let acc='', thinkAcc='', metricsStr='', pending=false;
    const thinkHtml=()=>thinkAcc?('<details class="oc-think"><summary>💭 Reasoning</summary><div class="oc-think-body">'+esc(thinkAcc)+'</div></details>'):'';
    const flush=()=>{ pending=false; ai.body.innerHTML=thinkHtml()+renderMD(acc)+'<span class="oc-cursor"></span>'; hist.scrollTop=hist.scrollHeight; };
    const schedule=()=>{ if(pending) return; pending=true; requestAnimationFrame(flush); };
    try{
      const res=await fetch(OUI+'/chat_stream',{method:'POST',credentials:'include',headers:{'X-Tz-Offset':String(-new Date().getTimezoneOffset())},body:fd(payload)});
      const rd=res.body.getReader(); const dec=new TextDecoder(); let buf='';
      while(true){ const {done,value}=await rd.read(); if(done) break; buf+=dec.decode(value,{stream:true}); const lines=buf.split('\n'); buf=lines.pop()||'';
        for(const line of lines){ if(!line.startsWith('data:')) continue; const dd=line.slice(5).trim(); if(dd==='[DONE]') continue;
          try{ const j=JSON.parse(dd);
            if(j.delta){ if(j.thinking){ thinkAcc+=j.delta; } else { acc+=j.delta; } schedule(); }
            else if(j.type==='tool_start'||j.type==='agent_step'){ const s=document.createElement('div'); s.className='oc-step'; s.innerHTML='<span class="material-symbols-rounded">build</span><div><b>'+esc(j.tool||j.type)+'</b>'+(j.command?'<pre><code>'+esc(j.command)+'</code></pre>':'')+'</div>'; ai.body.insertBefore(s, ai.body.firstChild); }
            else if(j.type==='metrics'&&j.data){ const m=j.data; metricsStr=(m.output_tokens!=null?(m.output_tokens+' tok'):'')+(m.response_time!=null?(' · '+m.response_time+'s'):'')+(m.context_percent!=null?(' · '+Math.round(m.context_percent)+'%'):''); }
            else if(j.status && Number(j.status)>=400){ acc+='\n\n**⚠ Error '+j.status+':** '+(j.text||'request failed'); schedule(); }
            else if(j.error){ acc+='\n\n**⚠ '+(j.error)+'**'; schedule(); }
          }catch(e){}
        }
      }
      ai.body.innerHTML=thinkHtml()+(renderMD(acc)||'<span style="color:var(--text-soft)">(no response)</span>'); highlightIn(ai.body);
      buildFoot(ai.foot,'ai', ()=>acc, metricsStr);
    }catch(e){ ai.body.innerHTML=renderMD(acc||'')+'<div style="color:var(--red)">Stream error.</div>'; }
    state.streaming=false; $('#ocSend').disabled=false; loadSessions();
  }

  // ---------- mode / toggles / input ----------
  function setMode(m){ state.mode=m; $('#ocModeAgent').classList.toggle('active',m==='agent'); $('#ocModeChat').classList.toggle('active',m==='chat'); $('#ocModePill').textContent=m==='agent'?'Agent':'Chat'; $('#ocBash').style.display=m==='agent'?'':'none'; }
  function toggle(btn,key){ state[key]=!state[key]; btn.classList.toggle('on',state[key]); }
  function autosize(){ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,200)+'px'; }

  // ---------- voice (browser Web Speech API — zero server config) ----------
  let recog=null;
  $('#ocMic').addEventListener('click', ()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ notify('Voice input needs Chrome/Edge (Web Speech API)','error'); return; }
    if(recog){ try{recog.stop();}catch(e){} return; }
    recog=new SR(); recog.lang='en-US'; recog.interimResults=true; recog.continuous=false;
    const base=input.value; let finalTxt='';
    recog.onresult=(e)=>{ let interim=''; for(let i=e.resultIndex;i<e.results.length;i++){ const t=e.results[i][0].transcript; if(e.results[i].isFinal) finalTxt+=t; else interim+=t; } input.value=(base?base+' ':'')+finalTxt+interim; autosize(); };
    recog.onerror=(e)=>{ notify('Voice: '+(e.error||'error'),'error'); };
    recog.onend=()=>{ $('#ocMic').classList.remove('on'); recog=null; input.focus(); };
    try{ recog.start(); $('#ocMic').classList.add('on'); notify('Listening… click mic to stop','info'); }catch(e){ recog=null; notify('Could not start mic','error'); }
  });

  // ---------- overflow menu ----------
  const ofMenu=$('#ocOverflowMenu');
  $('#ocOverflow').addEventListener('click',(e)=>{ e.stopPropagation(); ofMenu.hidden=!ofMenu.hidden; });
  document.addEventListener('click',(e)=>{ if(!ofMenu.hidden && !ofMenu.contains(e.target) && e.target!==$('#ocOverflow')) ofMenu.hidden=true; });
  ofMenu.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{ ofMenu.hidden=true; const a=b.dataset.of; if(a==='documents'){ if(window.openDocsDrawer) window.openDocsDrawer(); } else if(a==='notes'){ if(window.openNotesDrawer) window.openNotesDrawer(); } else if(a==='research'){ location.hash='#/research'; } else if(a==='attach'){ notify('Attachments coming soon','info'); } }));

  // ---------- wire ----------
  $('#ocNewChat').addEventListener('click', newChat);
  $('#ocSend').addEventListener('click', send);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } });
  input.addEventListener('input', autosize);
  $('#ocModeAgent').addEventListener('click',()=>setMode('agent'));
  $('#ocModeChat').addEventListener('click',()=>setMode('chat'));
  $('#ocWeb').addEventListener('click', e=>toggle(e.currentTarget,'web'));
  $('#ocBash').addEventListener('click', e=>toggle(e.currentTarget,'bash'));
  $('#ocModelPick').addEventListener('click', e=>openModelMenu(e.currentTarget));
  $('#ocToggleSide').addEventListener('click',()=>root.classList.toggle('side-collapsed'));
  $('#ocSearch').addEventListener('input', e=>{ const q=e.target.value.toLowerCase(); root.querySelectorAll('.oc-session-item').forEach(it=>{ it.style.display=it.textContent.toLowerCase().includes(q)?'':'none'; }); });

  ensureLibs();
  setMode('agent'); loadModels(); loadSessions(); showWelcome();
})();
</script>
