<div class="page-header">
  <div>
    <h1 class="page-title">Copilot</h1>
    <div class="page-subtitle">Your AI assistant — chat, draft, plan, and act</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn">
      <span class="material-symbols-rounded">insights</span>
      Insights
    </button>
    <span class="pill pill-green"><span class="dot"></span>Online</span>
  </div>
</div>

<div class="copilot">
  <aside class="copilot-rail">
    <div class="rail-head">
      <input class="rail-search" placeholder="Search chats" />
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:10px" id="newChatBtn">
        <span class="material-symbols-rounded">add</span>
        New Chat
      </button>
    </div>
    <div class="rail-list" id="railList"></div>
  </aside>

  <section class="copilot-main">
    <div class="copilot-head">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="avatar">M</div>
        <div>
          <div style="font-weight:700;color:var(--text-strong)">Max</div>
          <div style="font-size:12px;color:var(--text-muted)">Your AI assistant</div>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="icon-btn"><span class="material-symbols-rounded">history</span></button>
        <button class="icon-btn"><span class="material-symbols-rounded">more_horiz</span></button>
      </div>
    </div>

    <div class="copilot-body" id="copilotBody">
      <div class="copilot-empty">
        <div class="avatar-lg">M</div>
        <div class="hi">Hi, I'm Max</div>
        <div class="sub">Your AI Assistant · How can I help you today?</div>
      </div>
      <div class="action-grid" id="actionGrid"></div>
    </div>

    <div class="copilot-input">
      <button class="icon-btn" title="Attach"><span class="material-symbols-rounded">add</span></button>
      <input id="copilotInput" placeholder="Ask anything — try 'summarize my unread emails' or 'what's on my calendar this week?'" />
      <button class="icon-btn" title="Voice"><span class="material-symbols-rounded">mic</span></button>
      <button class="icon-btn primary" id="copilotSend" title="Send"><span class="material-symbols-rounded">send</span></button>
    </div>
  </section>
</div>

<div style="text-align:center;margin-top:20px">
  <a href="#/dashboard" style="font-size:13px">
    <span class="material-symbols-rounded" style="vertical-align:-5px;font-size:18px">arrow_back</span>
    Back to Dashboard
  </a>
</div>
